version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ../timeseries:/app/timeseries
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - MODEL_DIR=/app/timeseries/models_recursive
      - HYBRID_MODEL_PATH=/app/timeseries/out/recursive/recursive_model.joblib
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    command: streamlit run dashboard/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
